theme = "gruvbox_dark_soft"

[editor]
line-number = "relative"
bufferline = "multiple"
# auto-info = false
shell = [ "zsh", "-ic" ]
rulers = [120]
# Minimum severity to show a diagnostic after the end of a line
end-of-line-diagnostics = "hint"
[editor.soft-wrap]
enable=true

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
ret = "goto_word"
X = ["extend_line_up", "extend_to_line_bounds"]
A-x = "extend_to_line_bounds"

[keys.select]
X = ["extend_line_up", "extend_to_line_bounds"]
A-x = "extend_to_line_bounds"

[keys.normal."space"]
t = { r = {n = ":toggle line-number relative absolute"}}
g = {g = [":new", ":insert-output lg", ":buffer-close!", ":redraw"]}

[keys.normal."space"."space"]
c = ":buffer-close"
d = ":redraw"
l = ':toggle-option "lsp.display-inlay-hints"'
q = ":quit-all!"
r = ":reload-all"
s = ":hsplit"
S = ":pipe sort"
v = ":vsplit"
W = ":write-all!"
w = ":write"
x = ":write-quit-all"

[keys.normal."space"."space"."space"]
r = ":config-reload"
o = ":config-open"

[editor.cursor-shape]
insert = "bar"

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name"]

[editor.inline-diagnostics]
cursor-line = "error" # Show inline diagnostics when the cursor is on the line
other-lines = "disable" # Don't expand diagnostics unless the cursor is on the line
